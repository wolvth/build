# 文件路径: .github/workflows/build-openwrt-plugin.yml
# 通用 OpenWrt LuCI 插件编译器（APK 格式，OpenWrt 25.12.4 rockchip/armv8）
name: Build OpenWrt LuCI Plugin

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: '插件源码仓库地址'
        required: true
        default: 'https://github.com/wolvth/luci-app-dae.git'
      plugin_subdir:
        description: '插件在仓库中的子目录（留空表示仓库根目录即插件）'
        required: false
        default: ''
      package_name:
        description: 'OpenWrt 包名（Makefile 中的 PKG_NAME 或目录名）'
        required: false
        default: 'luci-app-dae'
      i18n_package:
        description: '翻译包名（留空则不编译翻译包）'
        required: false
        default: ''

# 默认值（直接 push 触发时使用，可按需修改）
env:
  DEFAULT_REPO_URL: "https://github.com/wolvth/luci-app-dae.git"
  DEFAULT_PLUGIN_SUBDIR: "luci-app-dae"
  DEFAULT_PACKAGE_NAME: "luci-app-dae"
  DEFAULT_I18N_PACKAGE: "luci-i18n-dae-zh-cn"

jobs:
  build:
    name: Build LuCI Plugin (.apk)
    runs-on: ubuntu-22.04

    steps:
    # ============================================
    # 第1步：解析输入参数
    #   workflow_dispatch 用用户输入，push 用默认值
    # ============================================
    - name: 解析输入参数
      run: |
        REPO_URL="${{ github.event.inputs.repo_url || env.DEFAULT_REPO_URL }}"
        PLUGIN_SUBDIR="${{ github.event.inputs.plugin_subdir || env.DEFAULT_PLUGIN_SUBDIR }}"
        PACKAGE_NAME="${{ github.event.inputs.package_name || env.DEFAULT_PACKAGE_NAME }}"
        I18N_PACKAGE="${{ github.event.inputs.i18n_package || env.DEFAULT_I18N_PACKAGE }}"

        echo "REPO_URL=${REPO_URL}"       >> $GITHUB_ENV
        echo "PLUGIN_SUBDIR=${PLUGIN_SUBDIR}" >> $GITHUB_ENV
        echo "PACKAGE_NAME=${PACKAGE_NAME}"   >> $GITHUB_ENV
        echo "I18N_PACKAGE=${I18N_PACKAGE}"   >> $GITHUB_ENV

        echo "=========================================="
        echo "📋 编译参数:"
        echo "   仓库地址:   ${REPO_URL}"
        echo "   插件子目录: ${PLUGIN_SUBDIR}"
        echo "   包名:       ${PACKAGE_NAME}"
        echo "   翻译包名:   ${I18N_PACKAGE}"
        echo "=========================================="

    # ============================================
    # 第2步：检出本仓库
    # ============================================
    - name: 检出仓库代码
      uses: actions/checkout@v4

    # ============================================
    # 第3步：安装系统依赖
    # ============================================
    - name: 安装系统依赖
      run: |
        sudo apt-get update -qq
        sudo apt-get install -yqq \
          build-essential \
          libncurses-dev \
          zlib1g-dev \
          gawk \
          git \
          gettext \
          libssl-dev \
          xsltproc \
          rsync \
          wget \
          unzip \
          python3 \
          python3-pyelftools \
          python3-dev \
          python3-setuptools \
          dos2unix \
          zstd

        # 验证 pyelftools
        python3 -c "from elftools.elf.elffile import ELFFile; print('✅ pyelftools OK')" || {
          echo "⚠️ apt 版本太旧，用 pip 装..."
          pip3 install pyelftools
        }
        echo "✅ 所有依赖就绪"

    # ============================================
    # 第4步：缓存 SDK 压缩包
    # ============================================
    - name: 缓存 SDK 压缩包
      id: cache-sdk
      uses: actions/cache@v4
      with:
        path: sdk.tar.zst
        key: sdk-tarball-openwrt-25.12.5-rockchip-armv8-v3

    # ============================================
    # 第5步：下载 SDK
    # ============================================
    - name: 下载 OpenWrt SDK
      if: steps.cache-sdk.outputs.cache-hit != 'true'
      run: |
        echo "📦 下载 OpenWrt 25.12.4 rockchip/armv8 SDK..."
        wget -q --show-progress \
          "https://downloads.openwrt.org/releases/25.12.5/targets/rockchip/armv8/openwrt-sdk-25.12.5-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst" \
          -O sdk.tar.zst
        echo "✅ 下载完成: $(du -h sdk.tar.zst | cut -f1)"

    # ============================================
    # 第6步：解压 SDK（每次都全新，无残留）
    # ============================================
    - name: 解压 SDK
      run: |
        rm -rf sdk
        mkdir -p sdk
        tar --zstd -xf sdk.tar.zst -C sdk --strip-components=1
        echo "✅ SDK 解压完成"

    # ============================================
    # 第7步：克隆插件源码
    # ============================================
    - name: 克隆插件源码
      run: |
        echo "📥 克隆: ${REPO_URL}"
        git clone --depth 1 "${REPO_URL}" /tmp/plugin-repo

        echo "仓库结构:"
        ls -la /tmp/plugin-repo/

        # 检查子目录是否存在
        if [ -n "${PLUGIN_SUBDIR}" ] && [ -d "/tmp/plugin-repo/${PLUGIN_SUBDIR}" ]; then
          echo "✅ 找到插件子目录: ${PLUGIN_SUBDIR}"
          ls -la "/tmp/plugin-repo/${PLUGIN_SUBDIR}/"
        else
          echo "ℹ️ 将使用仓库根目录作为插件源码"
        fi

    # ============================================
    # 第8步：更新 feeds
    # ============================================
    - name: 更新 feeds
      working-directory: sdk
      run: |
        ./scripts/feeds update -a >/dev/null 2>&1
        ./scripts/feeds install -a >/dev/null 2>&1
        echo "✅ feeds 完成"

    # ============================================
    # 第9步：放入插件源码到 SDK
    #   - 清理 feed 中同名包，避免冲突
    #   - 强制删除 Makefile 中所有 LUCI_DEPENDS 行
    # ============================================
    - name: 放入插件源码
      working-directory: sdk
      run: |
        # ---- 清理 feed 中同名包 ----
        rm -rf "package/feeds/luci/${PACKAGE_NAME}"           || true
        rm -rf "feeds/luci/applications/${PACKAGE_NAME}"      || true
        rm -rf "package/${PACKAGE_NAME}"                      || true

        BASE_NAME="${PACKAGE_NAME#luci-app-}"
        rm -rf "package/feeds/luci/luci-app-${BASE_NAME}d"    || true
        rm -rf "feeds/luci/applications/luci-app-${BASE_NAME}d" || true

        # ---- 拷贝源码 ----
        if [ -n "${PLUGIN_SUBDIR}" ] && [ -d "/tmp/plugin-repo/${PLUGIN_SUBDIR}" ]; then
          cp -rT "/tmp/plugin-repo/${PLUGIN_SUBDIR}" "package/${PACKAGE_NAME}"
        else
          cp -rT /tmp/plugin-repo "package/${PACKAGE_NAME}"
        fi

        # ---- 删除 LUCI_DEPENDS ----
        MAKEFILE="package/${PACKAGE_NAME}/Makefile"
        if [ -f "${MAKEFILE}" ]; then
          sed -i '/^LUCI_DEPENDS:/d' "${MAKEFILE}"
        fi

        # ============================================
        # 核心修复：www/ → htdocs/
        # luci.mk 的 Build/Prepare 阶段只会拷贝 htdocs/ 目录
        #   for d in luasrc ucode htdocs root src; do ...
        # 仓库用的是 www/，导致所有 JS 文件被忽略（404 的原因）
        # htdocs/ 安装到设备后自动映射为 /www/
        # ============================================
        if [ -d "package/${PACKAGE_NAME}/www" ]; then
          # 如果已经有 htdocs/，先合并再删除 www/
          if [ -d "package/${PACKAGE_NAME}/htdocs" ]; then
            echo "⚠️ 同时存在 www/ 和 htdocs/，合并内容..."
            cp -rT "package/${PACKAGE_NAME}/www" "package/${PACKAGE_NAME}/htdocs"
          else
            echo "🔧 将 www/ 重命名为 htdocs/（luci.mk 兼容性修复）"
            mv "package/${PACKAGE_NAME}/www" "package/${PACKAGE_NAME}/htdocs"
          fi
          echo "✅ www/ → htdocs/ 完成"
        elif [ -d "package/${PACKAGE_NAME}/htdocs" ]; then
          echo "ℹ️ 已经是 htdocs/，无需修改"
        else
          echo "⚠️ 没有 www/ 也没有 htdocs/，跳过"
        fi

        # ---- 确认文件路径 ----
        echo "📂 目录结构:"
        find "package/${PACKAGE_NAME}" -type f | sort | head -80

        # 确认 overview.js 路径正确
        echo ""
        echo "🔍 检查关键 JS 文件:"
        if [ -f "package/${PACKAGE_NAME}/htdocs/luci-static/resources/view/dae/overview.js" ]; then
          echo "  ✅ htdocs/luci-static/resources/view/dae/overview.js 存在"
        else
          echo "  ❌ overview.js 未找到，列出 view/ 目录:"
          find "package/${PACKAGE_NAME}" -path "*/view/*" -type f
        fi

        # 自动同步 Makefile 的版本号到 overview.js
        MAKE_VER=$(grep -Po 'PKG_VERSION:=\K.*' "package/${PACKAGE_NAME}/Makefile" || echo "1.0.0")
        
        # 使用更严格的正则 [^\"]* 防止破坏同行其他 JS 代码
        sed -i "s/const PKG_VERSION=\"[^\"]*\"/const PKG_VERSION=\"${MAKE_VER}\"/" "package/${PACKAGE_NAME}/htdocs/luci-static/resources/view/dae/overview.js"
        
        echo "✅ 已自动将前端 overview.js 版本号同步为: ${MAKE_VER}"
        
# ============================================
# 第10步：配置 .config（修复循环依赖）
# ============================================
    - name: 配置编译选项
      working-directory: sdk
      run: |
        cat > .config <<EOF
        CONFIG_PACKAGE_${PACKAGE_NAME}=y
        EOF

        if [ -n "${I18N_PACKAGE}" ]; then
          echo "CONFIG_PACKAGE_${I18N_PACKAGE}=y" >> .config
        fi

        # defconfig 可能会报 nginx-mod-ubus 循环依赖警告，这是 SDK 已知 bug
        # 加 || true 防止因为这个无关的警告导致整个 step 失败
        make defconfig || true

        echo "✅ 配置完成"
        grep -i "${PACKAGE_NAME}" .config || echo "⚠️ 未找到 ${PACKAGE_NAME}"

# ============================================
# 第11步：编译（修复花括号展开问题）
# ============================================
    - name: 编译插件
      working-directory: sdk
      run: |
        set -o pipefail

        echo "🔨 开始编译 ${PACKAGE_NAME}..."
        echo "   目标: rockchip/armv8"
        echo "   并行: $(nproc) 线程"
        echo ""

        # 先 clean 再 compile，分成两条命令
        # 不能写成 {clean,compile} 并加引号，否则 bash 不会展开花括号
        make package/${PACKAGE_NAME}/clean V=s -j$(nproc) || true

        echo ""
        echo "=== 开始编译 ==="
        echo ""

        make package/${PACKAGE_NAME}/compile V=s -j$(nproc) 2>&1 | tail -200

        echo ""
        echo "✅ 编译成功"

    # ============================================
    # 第12步：收集编译产物
    #   25.12.4 产出 .apk，同时兼容 .ipk
    # ============================================
    - name: 收集编译产物
      run: |
        mkdir -p artifacts

        echo "🔍 搜索编译产物..."

        # 按包名搜索 .apk 和 .ipk
        for ext in apk ipk; do
          find sdk/bin -type f -name "*${PACKAGE_NAME}*.${ext}" 2>/dev/null | while read f; do
            echo "  📦 ${ext^^}: $f"
            cp -v "$f" artifacts/
          done
        done

        # 如果有翻译包，也搜索
        if [ -n "${I18N_PACKAGE}" ]; then
          for ext in apk ipk; do
            find sdk/bin -type f -name "*${I18N_PACKAGE}*.${ext}" 2>/dev/null | while read f; do
              echo "  📦 ${ext^^}: $f"
              cp -v "$f" artifacts/
            done
          done
        fi

        echo ""
        echo "=========================================="
        echo "📦 编译产物列表:"
        echo "=========================================="
        ls -lh artifacts/

        if [ ! "$(ls -A artifacts/)" ]; then
          echo ""
          echo "❌ 未找到任何编译产物"
          echo "bin/ 目录内容（前50个文件）:"
          find sdk/bin -type f 2>/dev/null | head -50
          exit 1
        fi

        echo "✅ 产物收集完成"

    - name: 上传编译产物
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PACKAGE_NAME }}-apk
        path: artifacts/*
        if-no-files-found: error
        retention-days: 90

    - name: 清理工作空间
      if: always()
      run: |
        rm -rf sdk /tmp/plugin-repo artifacts
        echo "✅ 清理完成"
