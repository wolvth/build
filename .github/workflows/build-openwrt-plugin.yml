# 文件路径: .github/workflows/build-openwrt-plugin.yml
# 编译 luci-app-dae 的 APK 包（OpenWrt 25.12.4 已切换到 APK 包管理器）

name: Build luci-app-dae .apk (rockchip/armv8)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build .apk (OpenWrt 25.12.4 rockchip/armv8)
    runs-on: ubuntu-22.04

    steps:
    # ============================================
    # 第1步：检出本仓库代码
    # ============================================
    - name: 检出仓库代码
      uses: actions/checkout@v4

    # ============================================
    # 第2步：安装编译依赖
    #   关键修复：python3-elftools 解决 u-boot 前置检查报错
    #   关键修复：zstd 解决 .tar.zst 解压
    # ============================================
    - name: 安装系统依赖
      run: |
        sudo apt-get update -qq
        sudo apt-get install -yqq \
          build-essential \
          libncurses-dev \
          zlib1g-dev \
          gawk \
          git \
          gettext \
          libssl-dev \
          xsltproc \
          rsync \
          wget \
          unzip \
          python3 \
          zstd

    # ============================================
    # 第3步：缓存 SDK 压缩包
    #   只缓存压缩包本身，每次全新解压，避免 build state 残留
    # ============================================
    - name: 缓存 SDK 压缩包
      id: cache-sdk
      uses: actions/cache@v4
      with:
        path: sdk.tar.zst
        key: sdk-tarball-openwrt-25.12.4-rockchip-armv8-v1

    # ============================================
    # 第4步：下载 SDK
    #   只在缓存未命中时下载
    # ============================================
    - name: 下载 OpenWrt SDK
      if: steps.cache-sdk.outputs.cache-hit != 'true'
      run: |
        echo "📦 下载 SDK..."
        wget -q --show-progress \
          "https://downloads.openwrt.org/releases/25.12.4/targets/rockchip/armv8/openwrt-sdk-25.12.4-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst" \
          -O sdk.tar.zst
        echo "✅ 下载完成: $(du -h sdk.tar.zst | cut -f1)"

    # ============================================
    # 第5步：解压 SDK（每次都全新解压）
    # ============================================
    - name: 解压 SDK
      run: |
        rm -rf sdk
        mkdir -p sdk
        echo "📂 解压 SDK（.tar.zst 格式）..."
        tar --zstd -xf sdk.tar.zst -C sdk --strip-components=1
        echo "✅ 解压完成"
        ls sdk/

    # ============================================
    # 第6步：克隆插件源码
    #   从外部仓库获取 luci-app-dae 源码
    # ============================================
    - name: 克隆插件源码
      run: |
        # 克隆插件仓库（ysuolmai 版本，包含 luci-app-dae 子目录）
        echo "📥 克隆插件源码..."
        git clone --depth 1 \
          https://github.com/kozhini/luci-app-dae \
          /tmp/luci-app-dae-repo

        echo "仓库结构:"
        ls -la /tmp/luci-app-dae-repo/
        echo ""
        echo "luci-app-dae 子目录内容:"
        ls -la /tmp/luci-app-dae-repo/luci-app-dae/

    # ============================================
    # 第7步：更新 feeds
    # ============================================
    - name: 更新 feeds
      working-directory: sdk
      run: |
        echo "🔄 更新 feeds..."
        ./scripts/feeds update -a >/dev/null 2>&1
        echo "📦 安装 feeds..."
        ./scripts/feeds install -a >/dev/null 2>&1
        echo "✅ feeds 更新完成"

    # ============================================
    # 第8步：放入插件源码（覆盖 feed 中的同名包）
    #   参考你的 workflow，必须先删干净再拷贝，避免残留旧版本
    # ============================================
    - name: 放入插件源码到 SDK
      working-directory: sdk
      run: |
        # ---- 删除 feed 中可能存在的同名包 ----
        # ImmortalWrt/OpenWrt 的 luci feed 可能自带 luci-app-dae / luci-app-daed
        # 不删干净的话会编译 feed 里的旧版本，而不是我们的
        rm -rf package/feeds/luci/luci-app-dae
        rm -rf feeds/luci/applications/luci-app-dae
        rm -rf package/feeds/luci/luci-app-daed
        rm -rf feeds/luci/applications/luci-app-daed
        # 关键：package/ 下可能有缓存残留
        rm -rf package/luci-app-dae

        # ---- 拷贝我们的插件源码 ----
        # -rT: 递归拷贝，T 确保不会把源拷成子目录
        cp -rT /tmp/luci-app-dae-repo/luci-app-dae package/luci-app-dae

        # ---- Patch：去掉 dae 运行时依赖 ----
        # SDK 里没有 dae 二进制包，如果保留 +dae 依赖，
        # defconfig 会因为找不到 dae 包而报错
        # 实际安装时 dae 已由固件编译流程提供
        if [ -f package/luci-app-dae/Makefile ]; then
          sed -i 's/LUCI_DEPENDS:=+dae/LUCI_DEPENDS:=/' package/luci-app-dae/Makefile || true
          echo "✅ 已 patch Makefile（去掉 +dae 依赖）"
        fi

        echo ""
        echo "插件目录内容:"
        ls -la package/luci-app-dae/
        echo ""
        echo "Makefile 内容:"
        cat package/luci-app-dae/Makefile

    # ============================================
    # 第9步：配置 .config
    #   25.12.4 默认使用 APK 包管理器，无需额外配置
    # ============================================
    - name: 配置编译选项
      working-directory: sdk
      run: |
        # 写入最小配置：只编译我们需要的包
        cat > .config <<'EOF'
        CONFIG_PACKAGE_luci-app-dae=y
        CONFIG_PACKAGE_luci-i18n-dae-zh-cn=y
        EOF

        # 让 SDK 根据目标架构自动补全其余配置
        make defconfig

        echo "✅ 配置完成"
        echo ""
        echo "检查 dae 相关配置:"
        grep -i "dae" .config || echo "⚠️ 未找到 dae 相关配置"

    # ============================================
    # 第10步：编译
    # ============================================
    - name: 编译 luci-app-dae
      working-directory: sdk
      run: |
        echo "🔨 开始编译..."
        echo "   目标: rockchip/armv8"
        echo "   并行线程: $(nproc)"
        echo ""

        make package/luci-app-dae/{clean,compile} V=s -j$(nproc) 2>&1 | tail -200

        echo ""
        echo "✅ 编译完成"

    # ============================================
    # 第11步：收集编译产物
    #   25.12.4 产出 .apk 格式
    # ============================================
    - name: 收集编译产物
      run: |
        mkdir -p artifacts

        echo "🔍 搜索编译产物..."
        echo ""

        # 搜索 .apk 文件（25.12.4 默认格式）
        echo "=== 搜索 .apk ==="
        find sdk/bin -type f -name '*.apk' | grep -i dae | tee /dev/null | while read f; do
          echo "  找到: $f"
          cp -v "$f" artifacts/
        done

        # 兜底：也搜索 .ipk（以防万一）
        echo "=== 搜索 .ipk（兜底）==="
        find sdk/bin -type f -name '*.ipk' | grep -i dae | tee /dev/null | while read f; do
          echo "  找到: $f"
          cp -v "$f" artifacts/
        done

        echo ""
        echo "=========================================="
        echo "📦 编译产物:"
        echo "=========================================="
        ls -lh artifacts/

        # 确保至少有一个产物
        if [ ! "$(ls -A artifacts/)" ]; then
          echo ""
          echo "❌ 未找到任何编译产物！"
          echo "列出 bin/ 下所有文件供排查:"
          find sdk/bin -type f | head -50
          exit 1
        fi

        echo ""
        echo "✅ 产物收集完成"

    # ============================================
    # 第12步：上传到 GitHub Actions
    # ============================================
    - name: 上传编译产物
      uses: actions/upload-artifact@v4
      with:
        name: luci-app-dae-apk-rockchip-armv8
        path: artifacts/*
        if-no-files-found: error
        retention-days: 90

    # ============================================
    # 第13步：可选 - 发布到 Release
    # ============================================
    - name: 发布到 GitHub Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*

    # ============================================
    # 第14步：清理
    # ============================================
    - name: 清理工作空间
      if: always()
      run: |
        echo "🧹 清理..."
        rm -rf sdk /tmp/luci-app-dae-repo
        echo "✅ 清理完成"
