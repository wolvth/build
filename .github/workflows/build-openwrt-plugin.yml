# 文件路径: .github/workflows/build-openwrt-plugin.yml

name: 编译OpenWrt LuCI插件 (rockchip/armv8)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # 你提供的SDK地址
  SDK_URL: "https://downloads.openwrt.org/releases/25.12.4/targets/rockchip/armv8/openwrt-sdk-25.12.4-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
  # 插件仓库地址（你可以切换为 kozhini/luci-app-dae）
  PLUGIN_REPO: "https://github.com/ysuolmai/luci-app-dae.git"
  # 插件在仓库中的路径
  PLUGIN_PATH: "luci-app-dae"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # ============================================
    # 第1步：检出本仓库代码（workflow文件所在仓库）
    # ============================================
    - name: 检出仓库代码
      uses: actions/checkout@v4

    # ============================================
    # 第2步：安装编译所需的系统依赖
    # ============================================
    - name: 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          ccache \
          ecj \
          fastjar \
          file \
          g++ \
          gawk \
          gettext \
          git \
          java-propose-classpath \
          libelf-dev \
          libncurses-dev \
          libssl-dev \
          python3 \
          python3-dev \
          python3-distutils \
          python3-setuptools \
          rsync \
          subversion \
          swig \
          unzip \
          wget \
          xsltproc \
          zlib1g-dev \
          zstd          # 关键！.tar.zst 解压必须依赖 zstd
        echo "✅ 系统依赖安装完成"

    # ============================================
    # 第3步：下载并解压 OpenWrt SDK
    # ============================================
    - name: 下载并解压 OpenWrt SDK
      run: |
        # 创建工作目录
        mkdir -p ~/openwrt-build
        cd ~/openwrt-build
        
        echo "📦 开始下载 SDK..."
        echo "   URL: ${SDK_URL}"
        
        # 下载SDK（-L 跟随重定向，OpenWrt下载链接通常会重定向）
        wget -L -q --show-progress -O sdk.tar.zst "${SDK_URL}"
        
        echo "📦 下载完成，文件大小: $(du -h sdk.tar.zst | cut -f1)"
        
        # 解压 .tar.zst 格式
        echo "📂 解压 SDK..."
        tar --zstd -xf sdk.tar.zst
        
        # 找到解压后的SDK目录并重命名
        SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -1)
        if [ -z "${SDK_DIR}" ]; then
          echo "❌ 错误：找不到SDK目录"
          echo "当前目录内容:"
          ls -la
          exit 1
        fi
        
        mv "${SDK_DIR}" sdk
        rm -f sdk.tar.zst   # 删除压缩包释放空间
        
        echo "✅ SDK 解压完成"
        echo "SDK 目录结构:"
        ls -la sdk/

    # ============================================
    # 第4步：克隆插件源码并放入SDK
    # ============================================
    - name: 克隆插件源码
      run: |
        cd ~/openwrt-build
        
        echo "📥 克隆插件仓库: ${PLUGIN_REPO}"
        git clone --depth 1 "${PLUGIN_REPO}" temp_plugin
        
        echo "插件仓库内容:"
        ls -la temp_plugin/
        
        # 将插件复制到 SDK 的 package 目录
        mkdir -p sdk/package/luci-app-dae
        
        if [ -d "temp_plugin/${PLUGIN_PATH}" ]; then
          # 如果仓库里有子目录（如 luci-app-dae/）
          echo "📂 找到子目录 ${PLUGIN_PATH}，复制到 package/"
          cp -r temp_plugin/${PLUGIN_PATH}/* sdk/package/luci-app-dae/
        else
          # 否则整个仓库就是插件源码
          echo "📂 将整个仓库作为插件源码"
          cp -r temp_plugin/* sdk/package/luci-app-dae/
        fi
        
        # 清理临时目录
        rm -rf temp_plugin
        
        echo "✅ 插件源码已就位"
        echo "插件目录内容:"
        ls -la sdk/package/luci-app-dae/
        
        # 检查是否有 Makefile（OpenWrt插件必须有）
        if [ ! -f "sdk/package/luci-app-dae/Makefile" ]; then
          echo "⚠️ 警告：插件目录中没有找到 Makefile"
          echo "递归查找 Makefile:"
          find sdk/package/luci-app-dae/ -name "Makefile" -type f
        fi

    # ============================================
    # 第5步：更新 feeds 并配置 SDK
    # ============================================
    - name: 更新feeds并配置SDK
      run: |
        cd ~/openwrt-build/sdk
        
        # ---- 更新 feeds ----
        # feeds 是 OpenWrt 的包管理系统（类似 apt 源）
        echo "🔄 更新 feeds..."
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # ---- 生成默认配置 ----
        echo "⚙️ 生成默认 .config..."
        make defconfig
        
        # ---- 确保目标架构正确 ----
        # 设置为 rockchip/armv8
        cat >> .config << 'EOF'
        CONFIG_TARGET_rockchip=y
        CONFIG_TARGET_rockchip_armv8=y
        CONFIG_TARGET_rockchip_armv8_Default=y
        EOF
        
        # ---- 确保插件被选中 ----
        # 尝试多种可能的包名
        cat >> .config << 'EOF'
        CONFIG_PACKAGE_luci-app-dae=y
        CONFIG_PACKAGE_luci-i18n-dae-zh-cn=y
        EOF
        
        # ---- 处理依赖冲突 ----
        make defconfig
        
        echo "✅ 配置完成"
        echo "检查插件是否被选中:"
        grep -i "dae" .config || echo "⚠️ 未在 .config 中找到 dae 相关配置"

    # ============================================
    # 第6步：编译插件
    # ============================================
    - name: 编译插件
      run: |
        cd ~/openwrt-build/sdk
        
        echo "🔨 开始编译 luci-app-dae..."
        echo "   并行线程数: $(nproc)"
        
        # 编译插件及其依赖
        # V=s  显示详细输出，方便排错
        # -j  并行编译线程数
        make package/luci-app-dae/compile V=s -j$(nproc) || {
          echo ""
          echo "=========================================="
          echo "❌ 编译失败，尝试显示错误日志..."
          echo "=========================================="
          
          # 尝试找到错误日志
          find build_dir/ -name "*.log" -newer package/luci-app-dae -type f 2>/dev/null | head -5 | while read f; do
            echo "--- 日志文件: $f ---"
            tail -30 "$f"
            echo "---"
          done
          
          # 保存完整的编译日志
          mkdir -p ~/artifacts/logs
          find logs/ -name "*.log" -exec cp {} ~/artifacts/logs/ \; 2>/dev/null
          
          exit 1
        }
        
        echo "✅ 编译成功！"

    # ============================================
    # 第7步：收集编译产物
    # ============================================
    - name: 收集编译产物
      run: |
        cd ~/openwrt-build/sdk
        mkdir -p ~/artifacts/apk
        
        echo "🔍 查找编译产物..."
        
        # 查找所有生成的 ipk 文件（OpenWrt软件包格式）
        find bin/packages/ -name "*dae*" -type f 2>/dev/null | while read f; do
          echo "  找到: $f"
          cp "$f" ~/artifacts/apk/
        done
        
        # 也查找 luci 相关的
        find bin/targets/ -name "*dae*" -type f 2>/dev/null | while read f; do
          echo "  找到: $f"
          cp "$f" ~/artifacts/apk/
        done
        
        echo ""
        echo "📦 编译产物列表:"
        ls -lh ~/artifacts/apk/ || echo "⚠️ 未找到任何编译产物"
        
        # 如果没有找到产物，做更广泛的搜索
        if [ ! "$(ls -A ~/artifacts/ipk/)" ]; then
          echo ""
          echo "⚠️ 精确搜索未找到，进行更广泛搜索..."
          find bin/ -name "*.apk" -type f 2>/dev/null | head -20 | while read f; do
            echo "  找到ipk: $f"
            cp "$f" ~/artifacts/apk/
          done
        fi

    # ============================================
    # 第8步：上传编译产物到 GitHub Actions
    # ============================================
    - name: 上传编译产物
      uses: actions/upload-artifact@v4
      with:
        name: luci-app-dae-rockchip-armv8
        path: ~/artifacts/
        retention-days: 90

    # ============================================
    # 第9步：始终清理（即使失败也执行）
    # ============================================
    - name: 清理工作空间
      if: always()
      run: |
        echo "🧹 清理临时文件..."
        rm -rf ~/openwrt-build
        echo "✅ 清理完成"
