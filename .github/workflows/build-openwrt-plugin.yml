# 通用 OpenWrt LuCI 单插件编译器
# 支持任意 OpenWrt 版本、任意架构、多级子目录
name: Build OpenWrt Plugin

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: '插件源码仓库地址 (HTTPS)'
        required: true
        default: 'https://github.com/wolvth/luci-app-dae.git'
      repo_branch:
        description: '仓库分支'
        required: false
        default: 'main'
      plugin_subdir:
        description: '插件子目录（留空=仓库根目录，支持多级如 luci/dae）'
        required: false
        default: ''
      package_name:
        description: '包名（Makefile 中的 PKG_NAME，留空则自动检测）'
        required: false
        default: ''
      openwrt_version:
        description: 'OpenWrt SDK 版本'
        required: false
        default: '25.12.6'
      target_arch:
        description: '目标架构（格式: target subtarget）'
        required: false
        default: 'rockchip armv8'

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-24.04

    steps:
    # ── 解析参数 ──────────────────────────────────────────
    - name: 解析参数
      id: params
      run: |
        VERSION="${{ inputs.openwrt_version }}"
        ARCH="${{ inputs.target_arch }}"
        TARGET=$(echo "$ARCH" | awk '{print $1}')
        SUBTARGET=$(echo "$ARCH" | awk '{print $2}')
        PKG_NAME="${{ inputs.package_name }}"
        SUBDIR="${{ inputs.plugin_subdir }}"

        # 自动检测包名
        if [ -z "$PKG_NAME" ] && [ -n "$SUBDIR" ]; then
          # 从子目录最后一段推断，如 luci/dae → luci-app-dae（可被 Makefile 覆盖）
          LAST=$(basename "$SUBDIR")
          PKG_NAME="luci-app-${LAST}"
          echo "ℹ️ 包名自动推断: $PKG_NAME（编译时以 Makefile 为准）"
        fi

        echo "VERSION=$VERSION"         >> $GITHUB_ENV
        echo "TARGET=$TARGET"           >> $GITHUB_ENV
        echo "SUBTARGET=$SUBTARGET"     >> $GITHUB_ENV
        echo "PACKAGE_NAME=$PKG_NAME"   >> $GITHUB_ENV
        echo "PLUGIN_SUBDIR=$SUBDIR"    >> $GITHUB_ENV

        echo "=========================================="
        echo "📋 编译参数:"
        echo "   仓库:     ${{ inputs.repo_url }}"
        echo "   分支:     ${{ inputs.repo_branch }}"
        echo "   子目录:   ${SUBDIR:-<根目录>}"
        echo "   包名:     ${PKG_NAME:-<自动检测>}"
        echo "   版本:     $VERSION"
        echo "   架构:     $TARGET / $SUBTARGET"
        echo "=========================================="

    # ── 安装依赖 ──────────────────────────────────────────
    - name: 安装依赖
      run: |
        sudo apt-get update -qq
        sudo apt-get install -yqq \
          build-essential libncurses-dev zlib1g-dev gawk git \
          gettext libssl-dev xsltproc rsync wget unzip \
          python3 python3-pyelftools zstd dos2unix
        echo "✅ 依赖就绪"

    # ── SDK 缓存 ──────────────────────────────────────────
    - name: 缓存 SDK
      id: cache-sdk
      uses: actions/cache@v4
      with:
        path: sdk.tar.zst
        key: openwrt-sdk-${{ env.VERSION }}-${{ env.TARGET }}-${{ env.SUBTARGET }}

    # ── 下载 SDK ──────────────────────────────────────────
    - name: 下载 SDK
      if: steps.cache-sdk.outputs.cache-hit != 'true'
      run: |
        VERSION="${{ env.VERSION }}"
        TARGET="${{ env.TARGET }}"
        SUBTARGET="${{ env.SUBTARGET }}"
        BASE="https://downloads.openwrt.org/releases/${VERSION}/targets/${TARGET}/${SUBTARGET}"

        # 尝试多种命名格式
        FOUND=0
        for suffix in "musl" "gcc-14.3.0_musl" "gcc-13.3.0_musl" "gcc-12.3.0_musl"; do
          URL="${BASE}/openwrt-sdk-${VERSION}-${TARGET}-${SUBTARGET}_${suffix}.Linux-x86_64.tar.zst"
          echo "🔍 尝试: $URL"
          if wget --spider -q "$URL" 2>/dev/null; then
            echo "📦 下载: $URL"
            wget -q --show-progress "$URL" -O sdk.tar.zst
            FOUND=1
            break
          fi
        done

        if [ "$FOUND" -eq 0 ]; then
          echo "❌ 未找到 SDK，请检查版本和架构是否正确"
          echo "   版本: $VERSION"
          echo "   架构: $TARGET/$SUBTARGET"
          echo ""
          echo "可用版本列表:"
          wget -qO- "https://downloads.openwrt.org/releases/" | grep -oP 'href="/releases/\K[0-9.]+' | sort -V | tail -10
          exit 1
        fi
        echo "✅ 下载完成: $(du -h sdk.tar.zst | cut -f1)"

    # ── 解压 SDK ──────────────────────────────────────────
    - name: 解压 SDK
      run: |
        rm -rf sdk
        mkdir -p sdk
        tar --zstd -xf sdk.tar.zst -C sdk --strip-components=1
        echo "✅ SDK 解压完成"

    # ── 克隆源码 ──────────────────────────────────────────
    - name: 克隆插件源码
      run: |
        REPO_URL="${{ inputs.repo_url }}"
        BRANCH="${{ inputs.repo_branch }}"
        SUBDIR="${{ env.PLUGIN_SUBDIR }}"

        echo "📥 克隆: $REPO_URL ($BRANCH)"
        git clone --depth 1 --branch "$BRANCH" "$REPO_URL" /tmp/plugin-repo

        # 验证子目录
        if [ -n "$SUBDIR" ]; then
          if [ -d "/tmp/plugin-repo/${SUBDIR}" ]; then
            echo "✅ 找到子目录: ${SUBDIR}"
            ls -la "/tmp/plugin-repo/${SUBDIR}/"
          else
            echo "❌ 子目录不存在: ${SUBDIR}"
            echo "仓库结构:"
            find /tmp/plugin-repo -maxdepth 3 -type d | sort
            exit 1
          fi
        else
          echo "ℹ️ 使用仓库根目录"
          ls -la /tmp/plugin-repo/
        fi

    # ── 放入插件 ──────────────────────────────────────────
    - name: 放入插件源码
      working-directory: sdk
      run: |
        SUBDIR="${{ env.PLUGIN_SUBDIR }}"
        PKG_NAME="${{ env.PACKAGE_NAME }}"

        # 确定源码路径
        if [ -n "$SUBDIR" ] && [ -d "/tmp/plugin-repo/${SUBDIR}" ]; then
          SRC="/tmp/plugin-repo/${SUBDIR}"
        else
          SRC="/tmp/plugin-repo"
        fi

        # 从 Makefile 读取真实包名
        if [ -f "$SRC/Makefile" ]; then
          REAL_PKG=$(grep -m1 'PKG_NAME' "$SRC/Makefile" 2>/dev/null | sed 's/.*:=\s*//')
          if [ -n "$REAL_PKG" ]; then
            PKG_NAME="$REAL_PKG"
            echo "📦 从 Makefile 读取包名: $PKG_NAME"
            echo "PACKAGE_NAME=$PKG_NAME" >> $GITHUB_ENV
          fi
        fi

        # 兜底：用源码目录名
        if [ -z "$PKG_NAME" ]; then
          PKG_NAME=$(basename "$SRC")
          echo "📦 兜底用目录名: $PKG_NAME"
        fi
        echo "📦 最终包名: $PKG_NAME"

        # 清理同名包
        rm -rf "package/feeds/luci/${PKG_NAME}" 2>/dev/null || true
        rm -rf "feeds/luci/applications/${PKG_NAME}" 2>/dev/null || true
        rm -rf "package/${PKG_NAME}" 2>/dev/null || true

        # 拷贝源码
        cp -rT "$SRC" "package/${PKG_NAME}"
        echo "✅ 源码已放入 package/${PKG_NAME}"

        # 删除 LUCI_DEPENDS（SDK 里可能缺依赖）
        MAKEFILE="package/${PKG_NAME}/Makefile"
        if [ -f "$MAKEFILE" ] && grep -q 'LUCI_DEPENDS' "$MAKEFILE"; then
          echo "🔧 删除 LUCI_DEPENDS 行"
          sed -i '/^LUCI_DEPENDS:/d' "$MAKEFILE"
        fi

        # www/ → htdocs/ 兼容修复
        if [ -d "package/${PKG_NAME}/www" ]; then
          if [ -d "package/${PKG_NAME}/htdocs" ]; then
            cp -rT "package/${PKG_NAME}/www" "package/${PKG_NAME}/htdocs"
            rm -rf "package/${PKG_NAME}/www"
          else
            mv "package/${PKG_NAME}/www" "package/${PKG_NAME}/htdocs"
          fi
          echo "🔧 www/ → htdocs/"
        fi

        echo ""
        echo "📂 插件结构:"
        find "package/${PKG_NAME}" -type f | sort | head -50

    # ── 更新 feeds ────────────────────────────────────────
    - name: 更新 feeds
      working-directory: sdk
      run: |
        ./scripts/feeds update -a >/dev/null 2>&1
        ./scripts/feeds install -a >/dev/null 2>&1
        echo "✅ feeds 就绪"

    # ── 配置 ──────────────────────────────────────────────
    - name: 配置编译选项
      working-directory: sdk
      run: |
        PKG_NAME="${{ env.PACKAGE_NAME }}"
        cat > .config <<EOF
        CONFIG_PACKAGE_${PKG_NAME}=y
        EOF
        make defconfig 2>&1 | tail -5 || true
        echo "✅ 配置完成"
        grep "CONFIG_PACKAGE_${PKG_NAME}" .config || echo "⚠️ 未找到 ${PKG_NAME}"

    # ── 编译 ──────────────────────────────────────────────
    - name: 编译插件
      working-directory: sdk
      run: |
        PKG_NAME="${{ env.PACKAGE_NAME }}"
        echo "🔨 编译 ${PKG_NAME}..."
        make "package/${PKG_NAME}/clean" V=s -j$(nproc) 2>&1 | tail -3 || true
        make "package/${PKG_NAME}/compile" V=s -j$(nproc) 2>&1 | tail -50
        echo "✅ 编译完成"

    # ── 收集产物 ──────────────────────────────────────────
    - name: 收集编译产物
      run: |
        PKG_NAME="${{ env.PACKAGE_NAME }}"
        mkdir -p artifacts

        for ext in apk ipk; do
          find sdk/bin -type f -name "*${PKG_NAME}*.${ext}" 2>/dev/null | while read f; do
            echo "📦 $(basename "$f")"
            cp "$f" artifacts/
          done
        done

        if [ ! "$(ls -A artifacts/ 2>/dev/null)" ]; then
          echo "❌ 未找到编译产物"
          echo "bin/ 目录:"
          find sdk/bin -type f -name "*.apk" -o -name "*.ipk" 2>/dev/null | head -20
          exit 1
        fi

        echo ""
        echo "📦 产物列表:"
        ls -lh artifacts/

    - name: 上传产物
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PACKAGE_NAME }}-${{ env.VERSION }}-${{ env.TARGET }}-${{ env.SUBTARGET }}
        path: artifacts/*
        if-no-files-found: error
        retention-days: 90

    - name: 清理
      if: always()
      run: rm -rf sdk /tmp/plugin-repo artifacts
