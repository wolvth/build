# 文件路径: .github/workflows/build-openwrt-plugin.yml
# 编译 luci-app-dae 的 APK 包（OpenWrt 25.12.4 rockchip/armv8）

name: Build luci-app-dae .apk

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build .apk (OpenWrt 25.12.4 rockchip/armv8)
    runs-on: ubuntu-22.04

    steps:
    # ============================================
    # 第1步：检出仓库代码
    # ============================================
    - name: 检出仓库代码
      uses: actions/checkout@v4

    # ============================================
    # 第2步：安装编译依赖
    #   关键修复：
    #     - python3-pyelftools（不是 python3-elftools！）
    #       解决 "Please install the Python3 elftools module"
    #     - zstd 解决 .tar.zst 解压
    # ============================================
    - name: 安装系统依赖
      run: |
        sudo apt-get update -qq
        sudo apt-get install -yqq \
          build-essential \
          libncurses-dev \
          zlib1g-dev \
          gawk \
          git \
          gettext \
          libssl-dev \
          xsltproc \
          rsync \
          wget \
          unzip \
          python3 \
          python3-pyelftools \
          python3-dev \
          python3-setuptools \
          zstd

        # ---- 验证关键依赖 ----
        echo "=== 验证 python3-pyelftools ==="
        python3 -c "from elftools.elf.elffile import ELFFile; print('✅ pyelftools OK')" || {
          echo "❌ pyelftools 导入失败，尝试 pip 安装..."
          pip3 install pyelftools
        }

        echo "=== 验证 zstd ==="
        zstd --version

    # ============================================
    # 第3步：缓存 SDK 压缩包（只缓存压缩包，避免 build state 残留）
    # ============================================
    - name: 缓存 SDK 压缩包
      id: cache-sdk
      uses: actions/cache@v4
      with:
        path: sdk.tar.zst
        key: sdk-tarball-openwrt-25.12.4-rockchip-armv8-v2

    # ============================================
    # 第4步：下载 SDK（仅缓存未命中时）
    # ============================================
    - name: 下载 OpenWrt SDK
      if: steps.cache-sdk.outputs.cache-hit != 'true'
      run: |
        echo "📦 下载 SDK..."
        wget -q --show-progress \
          "https://downloads.openwrt.org/releases/25.12.4/targets/rockchip/armv8/openwrt-sdk-25.12.4-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst" \
          -O sdk.tar.zst
        echo "✅ 下载完成: $(du -h sdk.tar.zst | cut -f1)"

    # ============================================
    # 第5步：解压 SDK（每次都全新解压）
    # ============================================
    - name: 解压 SDK
      run: |
        rm -rf sdk
        mkdir -p sdk
        echo "📂 解压 SDK..."
        tar --zstd -xf sdk.tar.zst -C sdk --strip-components=1
        echo "✅ 解压完成"

    # ============================================
    # 第6步：克隆插件源码
    # ============================================
    - name: 克隆插件源码
      run: |
        echo "📥 克隆插件源码..."
        git clone --depth 1 \
          https://github.com/ysuolmai/luci-app-dae.git \
          /tmp/luci-app-dae-repo

        echo "仓库结构:"
        ls -la /tmp/luci-app-dae-repo/
        if [ -d /tmp/luci-app-dae-repo/luci-app-dae ]; then
          echo "luci-app-dae 子目录:"
          ls -la /tmp/luci-app-dae-repo/luci-app-dae/
        fi

    # ============================================
    # 第7步：更新 feeds
    # ============================================
    - name: 更新 feeds
      working-directory: sdk
      run: |
        echo "🔄 更新 feeds..."
        ./scripts/feeds update -a >/dev/null 2>&1
        echo "📦 安装 feeds..."
        ./scripts/feeds install -a >/dev/null 2>&1
        echo "✅ feeds 完成"

    # ============================================
    # 第8步：放入插件源码
    #   清理 feed 中同名包，只用我们自己的
    # ============================================
    - name: 放入插件源码
      working-directory: sdk
      run: |
        # ---- 清理 feed 中的同名包 ----
        rm -rf package/feeds/luci/luci-app-dae
        rm -rf feeds/luci/applications/luci-app-dae
        rm -rf package/feeds/luci/luci-app-daed
        rm -rf feeds/luci/applications/luci-app-daed
        rm -rf package/luci-app-dae

        # ---- 拷贝我们的源码 ----
        if [ -d /tmp/luci-app-dae-repo/luci-app-dae ]; then
          cp -rT /tmp/luci-app-dae-repo/luci-app-dae package/luci-app-dae
        else
          cp -rT /tmp/luci-app-dae-repo package/luci-app-dae
        fi

        # ---- Patch：去掉 dae 运行时依赖 ----
        # SDK 里没有 dae 二进制包，保留会导致 defconfig 找不到依赖
        if grep -q '+dae' package/luci-app-dae/Makefile 2>/dev/null; then
          sed -i 's/LUCI_DEPENDS:=+dae/LUCI_DEPENDS:=/' package/luci-app-dae/Makefile
          echo "✅ 已 patch Makefile（去掉 +dae 依赖）"
        fi

        echo ""
        echo "插件 Makefile:"
        cat package/luci-app-dae/Makefile

    # ============================================
    # 第9步：配置
    #   只选中我们要编译的包
    # ============================================
    - name: 配置编译选项
      working-directory: sdk
      run: |
        cat > .config <<'EOF'
        CONFIG_PACKAGE_luci-app-dae=y
        CONFIG_PACKAGE_luci-i18n-dae-zh-cn=y
        EOF

        make defconfig

        echo "✅ 配置完成"
        echo ""
        echo "dae 相关配置:"
        grep -i "dae" .config || echo "⚠️ 未找到 dae 配置"

    # ============================================
    # 第10步：编译
    #   修复：用 set -o pipefail 确保 make 失败时整个 step 也失败
    # ============================================
    - name: 编译 luci-app-dae
      working-directory: sdk
      run: |
        set -o pipefail

        echo "🔨 开始编译..."
        echo "   目标: rockchip/armv8"
        echo "   并行线程: $(nproc)"
        echo ""

        make package/luci-app-dae/{clean,compile} V=s -j$(nproc) 2>&1 | tail -200
        echo ""
        echo "✅ 编译成功"

    # ============================================
    # 第11步：收集编译产物
    # ============================================
    - name: 收集编译产物
      run: |
        mkdir -p artifacts

        echo "🔍 搜索编译产物..."

        # 搜索 .apk（25.12.4 默认格式）
        find sdk/bin -type f -name '*.apk' 2>/dev/null | grep -i dae | while read f; do
          echo "  📦 APK: $f"
          cp -v "$f" artifacts/
        done

        # 兜底：也搜索 .ipk
        find sdk/bin -type f -name '*.ipk' 2>/dev/null | grep -i dae | while read f; do
          echo "  📦 IPK: $f"
          cp -v "$f" artifacts/
        done

        echo ""
        echo "=========================================="
        echo "📦 编译产物:"
        echo "=========================================="
        ls -lh artifacts/

        if [ ! "$(ls -A artifacts/)" ]; then
          echo ""
          echo "❌ 未找到编译产物"
          exit 1
        fi

        echo "✅ 产物收集完成"

    # ============================================
    # 第12步：上传到 GitHub Actions
    # ============================================
    - name: 上传编译产物
      uses: actions/upload-artifact@v4
      with:
        name: luci-app-dae-apk-rockchip-armv8
        path: artifacts/*
        if-no-files-found: error
        retention-days: 90

    # ============================================
    # 第13步：清理
    # ============================================
    - name: 清理工作空间
      if: always()
      run: |
        echo "🧹 清理..."
        rm -rf sdk /tmp/luci-app-dae-repo artifacts
        echo "✅ 清理完成"
