name: Build OpenWrt Package

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: '插件仓库地址 (HTTPS)'
        required: true
        default: 'https://github.com/wolvth/build'
      repo_branch:
        description: '仓库分支'
        required: false
        default: 'main'
      package_dir:
        description: '插件在仓库中的子目录 (留空=仓库根目录)'
        required: false
        default: 'new/luci-app-dae'
      openwrt_branch:
        description: 'OpenWrt 分支 (openwrt-24.10 / openwrt-23.05 / main)'
        required: false
        default: 'openwrt-25.12'
      target_arch:
        description: '目标架构'
        required: true
        type: choice
        options:
          - aarch64_generic        
          - x86_64
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - arm_cortex-a7_neon-vfpv4
          - mipsel_24kc
        default: 'aarch64_generic'

env:
  FEED_NAME: custom_plugins

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:

    # ── 1. 准备编译环境 ──────────────────────────────────────────
    - name: 安装编译依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libelf-dev \
          libssl-dev python3 python3-dev rsync unzip \
          python3-pyelftools python3-dev python3-setuptools\
          zlib1g-dev file wget qemu-utils zstd

    # ── 2. 获取 OpenWrt 源码 ─────────────────────────────────────
    - name: 克隆 OpenWrt
      run: |
        git clone --depth 1 --branch ${{ inputs.openwrt_branch }} \
          https://github.com/openwrt/openwrt.git openwrt

    # ── 3. 获取插件源码 ──────────────────────────────────────────
    - name: 克隆插件仓库
      run: |
        git clone --depth 1 --branch ${{ inputs.repo_branch }} \
          ${{ inputs.repo_url }} plugin_repo

        echo "=== 仓库内容 ==="
        ls -la plugin_repo/

        # 确定插件目录
        PKG_DIR="${{ inputs.package_dir }}"
        if [ -z "$PKG_DIR" ]; then
          # 使用仓库根目录
          PLUGIN_SRC="plugin_repo"
        else
          PLUGIN_SRC="plugin_repo/${PKG_DIR}"
        fi

        if [ ! -d "$PLUGIN_SRC" ]; then
          echo "❌ 找不到目录: $PKG_DIR"
          echo "仓库根目录内容:"
          ls -la plugin_repo/
          exit 1
        fi

        echo "=== 插件目录内容 ==="
        ls -la "$PLUGIN_SRC/"

        # 检查是否有 Makefile
        if [ ! -f "$PLUGIN_SRC/Makefile" ]; then
          echo "⚠️  警告: 插件目录中没有 Makefile"
          # 检查子目录
          find "$PLUGIN_SRC" -name "Makefile" -maxdepth 3 | head -5
        fi

        # 如果子目录中只有一个目录且包含 Makefile，自动深入
        if [ ! -f "$PLUGIN_SRC/Makefile" ]; then
          SUBDIRS=$(find "$PLUGIN_SRC" -maxdepth 1 -mindepth 1 -type d)
          SUBCOUNT=$(echo "$SUBDIRS" | wc -l)
          if [ "$SUBCOUNT" = "1" ] && [ -f "$SUBDIRS/Makefile" ]; then
            echo "自动深入子目录: $SUBDIRS"
            PLUGIN_SRC="$SUBDIRS"
          fi
        fi

        echo "PLUGIN_SRC=$PLUGIN_SRC" >> $GITHUB_ENV

    # ── 4. 集成插件到 OpenWrt 构建系统 ───────────────────────────
    - name: 集成插件
      run: |
        cd openwrt

        # 复制插件到 feeds 目录
        mkdir -p feeds/${{ env.FEED_NAME }}
        cp -a "$PLUGIN_SRC" feeds/${{ env.FEED_NAME }}/

        # 查找所有插件目录（支持一个仓库包含多个插件）
        echo "=== 已添加的插件 ==="
        find feeds/${{ env.FEED_NAME }} -name "Makefile" -maxdepth 3 \
          -exec grep -l "LUCI_TITLE\|PKG_NAME" {} \; | while read f; do
            PKG=$(grep -m1 'PKG_NAME' "$f" | sed 's/.*:=\s*//')
            echo "  📦 $PKG ($(dirname $f))"
          done

        # 更新 feeds
        echo "src-link ${{ env.FEED_NAME }} $(pwd)/feeds/${{ env.FEED_NAME }}" >> feeds.conf.default
        ./scripts/feeds update ${{ env.FEED_NAME }}
        ./scripts/feeds install -a -p ${{ env.FEED_NAME }}

        # 检查插件是否被识别
        echo "=== 已安装的自定义插件 ==="
        ./scripts/feeds list -p ${{ env.FEED_NAME }} 2>/dev/null || echo "(feeds list 不可用)"

    # ── 5. 配置编译目标 ──────────────────────────────────────────
    - name: 配置 .config
      run: |
        cd openwrt

        # 下载目标架构的默认配置
        # 这里使用最小配置，只编译需要的包
        cat > .config << EOF
        CONFIG_TARGET_${{ inputs.target_arch }}=y
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-base=y
        CONFIG_PACKAGE_luci-compat=y
        CONFIG_PACKAGE_luci-lib-ipkg=y
        EOF

        # 自动勾选所有自定义插件
        find feeds/${{ env.FEED_NAME }} -name "Makefile" -maxdepth 3 \
          -exec grep -l "PKG_NAME" {} \; | while read f; do
            PKG=$(grep -m1 'PKG_NAME' "$f" | sed 's/.*:=\s*//')
            echo "CONFIG_PACKAGE_${PKG}=y" >> .config
            echo "CONFIG_PACKAGE_luci-i18n-${PKG#luci-app-}-zh-cn=y" >> .config
          done

        # 解决依赖
        make defconfig

    # ── 6. 下载工具链和源码 ──────────────────────────────────────
    - name: 下载源码
      run: |
        cd openwrt
        make download -j$(nproc) || true
        find dl -size -1024c -delete 2>/dev/null || true

    # ── 7. 编译插件（仅编译包，不编译固件） ────────────────────────
    - name: 编译插件
      run: |
        cd openwrt

        # 只编译工具链 + 目标包（不编译完整固件，节省时间）
        make tools/install -j$(nproc) || make tools/install -j1 V=s
        make toolchain/install -j$(nproc) || make toolchain/install -j1 V=s

        # 编译所有自定义插件
        find feeds/${{ env.FEED_NAME }} -name "Makefile" -maxdepth 3 \
          -exec grep -l "PKG_NAME" {} \; | while read f; do
            PKG=$(grep -m1 'PKG_NAME' "$f" | sed 's/.*:=\s*//')
            echo "============================================"
            echo "  编译: $PKG"
            echo "============================================"
            make package/${PKG}/compile -j1 V=s || {
              echo "❌ $PKG 编译失败"
              exit 1
            }
          done

    # ── 8. 收集产物 ──────────────────────────────────────────────
    - name: 收集编译产物
      run: |
        cd openwrt
        mkdir -p ${{ github.workspace }}/output

        # 查找所有编译出的包文件
        find bin/packages/ -name "*.ipk" -o -name "*.apk" 2>/dev/null | \
          while read f; do
            cp "$f" ${{ github.workspace }}/output/
            echo "📦 $(basename $f)"
          done

        # 也查找 targets 下的包
        find bin/targets/ -name "*.ipk" -o -name "*.apk" 2>/dev/null | \
          while read f; do
            cp "$f" ${{ github.workspace }}/output/
            echo "📦 $(basename $f)"
          done

        echo "=== 所有产物 ==="
        ls -lh ${{ github.workspace }}/output/

    # ── 9. 上传产物 ──────────────────────────────────────────────
    - name: 上传编译产物
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-packages
        path: output/
        retention-days: 30
