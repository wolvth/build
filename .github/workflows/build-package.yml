name: Build OpenWrt Package

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: '插件仓库地址 (HTTPS)'
        required: true
        default: https://github.com/wolvth/build.git'
      repo_branch:
        description: '仓库分支'
        required: false
        default: 'main'
      package_dir:
        description: '插件在仓库中的子目录 (留空=编译所有包含Makefile的插件)'
        required: false
        default: 'new'
      openwrt_version:
        description: 'OpenWrt 版本'
        required: true
        type: choice
        options:
          - '25.12.5'
          - '24.10.5'
        default: '25.12.5'
      target_arch:
        description: '目标架构 (TARGET SUBTARGET)'
        required: true
        type: choice
        options:
          - 'rockchip armv8'
          - 'x86 64'
          - 'mediatek filogic'
          - 'mediatek mt7622'
          - 'qualcommax ipq807x'
          - 'bcm27xx bcm2711'
          - 'sunxi cortexa53'
        default: 'rockchip armv8'
      gcc_version:
        description: 'GCC 版本 (查看 downloads.openwrt.org 确认)'
        required: false
        default: '14.3.0'

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      FEED_NAME: custom_plugins

    steps:

    # ── 1. 解析架构参数 ──────────────────────────────────────────
    - name: 解析参数
      run: |
        TARGET=$(echo "${{ inputs.target_arch }}" | awk '{print $1}')
        SUBTARGET=$(echo "${{ inputs.target_arch }}" | awk '{print $2}')
        VERSION="${{ inputs.openwrt_version }}"

        GCC="${{ inputs.gcc_version }}"
        GCC="${GCC:-14.3.0}"

        # 尝试多种文件名格式
        SDK_URL=""
        for suffix in "gcc-${GCC}_musl" "musl"; do
          CANDIDATE="openwrt-sdk-${VERSION}-${TARGET}-${SUBTARGET}_${suffix}.Linux-x86_64.tar.zst"
          FULL_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/${TARGET}/${SUBTARGET}/${CANDIDATE}"
          echo "🔍 尝试: $FULL_URL"
          if wget --spider -q "$FULL_URL" 2>/dev/null; then
            SDK_URL="$FULL_URL"
            SDK_FILE="$CANDIDATE"
            break
          fi
        done

        if [ -z "$SDK_URL" ]; then
          echo "❌ 找不到 SDK 文件"
          echo "请检查: https://downloads.openwrt.org/releases/${VERSION}/targets/${TARGET}/${SUBTARGET}/"
          echo "可能需要调整 GCC 版本参数"
          exit 1
        fi

        echo "TARGET=$TARGET" >> $GITHUB_ENV
        echo "SUBTARGET=$SUBTARGET" >> $GITHUB_ENV
        echo "SDK_URL=$SDK_URL" >> $GITHUB_ENV
        echo "SDK_FILE=$SDK_FILE" >> $GITHUB_ENV

        echo "📦 SDK: $SDK_URL"

    # ── 2. 安装依赖 ─────────────────────────────────────────────
    - name: 安装编译依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libelf-dev \
          libssl-dev python3 python3-dev rsync unzip \
          python3-pyelftools python3-dev python3-setuptools\
          zlib1g-dev file wget qemu-utils zstd

    # ── 3. 下载并解压 SDK ────────────────────────────────────────
    - name: 下载 OpenWrt SDK
      run: |
        echo "📥 下载 SDK..."
        wget -q --show-progress "$SDK_URL" -O "$SDK_FILE"

        echo "📂 解压 SDK..."
        tar --use-compress-program=unzstd -xf "$SDK_FILE"
        mv openwrt-sdk-* openwrt-sdk
        rm -f "$SDK_FILE"

        echo "✅ SDK 就绪"
        ls openwrt-sdk/

    # ── 4. 获取插件源码 ──────────────────────────────────────────
    - name: 克隆插件仓库
      run: |
        git clone --depth 1 --branch ${{ inputs.repo_branch }} \
          ${{ inputs.repo_url }} plugin_repo

        echo "=== 仓库结构 ==="
        find plugin_repo -maxdepth 3 -type d | sort
        echo ""

        # 收集所有插件目录（包含 Makefile 且有 PKG_NAME 的目录）
        PKG_DIR="${{ inputs.package_dir }}"
        PLUGIN_DIRS=()

        if [ -n "$PKG_DIR" ]; then
          # 指定了子目录，从该子目录下找
          SEARCH_ROOT="plugin_repo/${PKG_DIR}"
          if [ ! -d "$SEARCH_ROOT" ]; then
            echo "❌ 目录不存在: $PKG_DIR"
            find plugin_repo -maxdepth 2 -type d | sort
            exit 1
          fi
        else
          # 没指定，搜索整个仓库
          SEARCH_ROOT="plugin_repo"
        fi

        # 查找所有包含 Makefile + PKG_NAME 的目录
        while IFS= read -r makefile; do
          dir=$(dirname "$makefile")
          if grep -q 'PKG_NAME' "$makefile" 2>/dev/null; then
            PLUGIN_DIRS+=("$dir")
            PKG=$(grep -m1 'PKG_NAME' "$makefile" | sed 's/.*:=\s*//')
            echo "📦 发现插件: $PKG ($dir)"
          fi
        done < <(find "$SEARCH_ROOT" -maxdepth 3 -name 'Makefile')

        if [ ${#PLUGIN_DIRS[@]} -eq 0 ]; then
          echo "❌ 未找到任何插件（需要包含 PKG_NAME 的 Makefile）"
          find "$SEARCH_ROOT" -maxdepth 3 -name 'Makefile' | head -10
          exit 1
        fi

        echo ""
        echo "共发现 ${#PLUGIN_DIRS[@]} 个插件"

        # 保存插件目录列表
        printf '%s\n' "${PLUGIN_DIRS[@]}" > /tmp/plugin_dirs.txt

    # ── 5. 集成插件到 SDK ────────────────────────────────────────
    - name: 集成插件
      run: |
        cd openwrt-sdk

        # 复制所有插件目录
        mkdir -p feeds/${{ env.FEED_NAME }}
        while IFS= read -r dir; do
          cp -a "$dir" feeds/${{ env.FEED_NAME }}/
          PKG=$(grep -m1 'PKG_NAME' "$dir/Makefile" | sed 's/.*:=\s*//')
          echo "✅ 已添加: $PKG"
        done < /tmp/plugin_dirs.txt

        # 注册 feed
        echo "src-link ${{ env.FEED_NAME }} $(pwd)/feeds/${{ env.FEED_NAME }}" >> feeds.conf.default

        # 更新 feeds
        ./scripts/feeds update ${{ env.FEED_NAME }}
        ./scripts/feeds install -a -p ${{ env.FEED_NAME }}

        echo ""
        echo "=== 已安装的插件 ==="
        ./scripts/feeds list -p ${{ env.FEED_NAME }} 2>/dev/null || true

    # ── 6. 配置编译选项 ──────────────────────────────────────────
    - name: 配置编译
      run: |
        cd openwrt-sdk

        # 生成最小配置
        cat > .config << EOF
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-base=y
        CONFIG_PACKAGE_luci-compat=y
        EOF

        # 自动勾选所有自定义插件
        while IFS= read -r dir; do
          PKG=$(grep -m1 'PKG_NAME' "$dir/Makefile" | sed 's/.*:=\s*//')
          echo "CONFIG_PACKAGE_${PKG}=y" >> .config
          # 尝试添加中文语言包
          SHORT=${PKG#luci-app-}
          echo "CONFIG_PACKAGE_luci-i18n-${SHORT}-zh-cn=y" >> .config
        done < /tmp/plugin_dirs.txt

        make defconfig

        echo "=== 编译配置 ==="
        grep -E '^CONFIG_PACKAGE_' .config | grep '=y$' | grep -v 'NOT_SET'

    # ── 7. 编译插件 ──────────────────────────────────────────────
    - name: 编译插件
      run: |
        cd openwrt-sdk

        # SDK 已有工具链，直接编译包
        while IFS= read -r dir; do
          PKG=$(grep -m1 'PKG_NAME' "$dir/Makefile" | sed 's/.*:=\s*//')
          echo ""
          echo "============================================"
          echo "  🔨 编译: $PKG"
          echo "============================================"
          make package/${PKG}/compile -j$(nproc) V=s
          echo "✅ $PKG 编译完成"
        done < /tmp/plugin_dirs.txt

    # ── 8. 收集产物 ──────────────────────────────────────────────
    - name: 收集编译产物
      run: |
        cd openwrt-sdk
        mkdir -p ${{ github.workspace }}/output

        # 收集所有 ipk/apk
        find bin/ -name "*.ipk" -o -name "*.apk" 2>/dev/null | while read f; do
          cp "$f" ${{ github.workspace }}/output/
          echo "📦 $(basename $f)"
        done

        echo ""
        echo "=== 所有产物 ==="
        ls -lh ${{ github.workspace }}/output/

    # ── 9. 上传产物 ──────────────────────────────────────────────
    - name: 上传编译产物
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-packages
        path: output/
        retention-days: 30
