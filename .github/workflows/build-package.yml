name: Build OpenWrt Plugin

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: '插件仓库地址 (HTTPS)'
        required: true
        default: 'https://github.com/wolvth/build.git'
      repo_branch:
        description: '仓库分支'
        required: false
        default: 'main'
      package_dir:
        description: '插件在仓库中的子目录 (留空=仓库根目录)'
        required: false
        default: 'new/luci-app-dae'
      openwrt_version:
        description: 'OpenWrt 版本'
        required: true
        type: choice
        options: ['25.12.5', '24.10.5']
        default: '25.12.5'
      target_arch:
        description: '目标架构'
        required: true
        type: choice
        options: ['rockchip armv8', 'x86 64', 'mediatek filogic', 'mediatek mt7622', 'qualcommax ipq807x']
        default: 'rockchip armv8'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: 解析参数
        run: |
          REPO_URL="${{ github.event.inputs.repo_url || env.DEFAULT_REPO_URL }}"
          PLUGIN_SUBDIR="${{ github.event.inputs.package_dir || env.DEFAULT_PLUGIN_SUBDIR }}"        
          TARGET=$(echo "${{ inputs.target_arch }}" | awk '{print $1}')
          SUBTARGET=$(echo "${{ inputs.target_arch }}" | awk '{print $2}')
          GCC="${{ inputs.gcc_version }}"
          GCC="${GCC:-14.3.0}"

          echo "TARGET=$TARGET"         >> $GITHUB_ENV
          echo "SUBTARGET=$SUBTARGET"   >> $GITHUB_ENV
          echo "VERSION=${{ inputs.openwrt_version }}" >> $GITHUB_ENV
          echo "GCC=$GCC"               >> $GITHUB_ENV

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq build-essential libncurses-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3 python3-pyelftools zstd
          echo "✅ 依赖就绪"

      - name: 下载 SDK
        run: |
          VERSION="${{ env.VERSION }}"
          TARGET="${{ env.TARGET }}"
          SUBTARGET="${{ env.SUBTARGET }}"
          GCC="${{ env.GCC }}"

          BASE="https://downloads.openwrt.org/releases/${VERSION}/targets/${TARGET}/${SUBTARGET}"

          for suffix in "gcc-${GCC}_musl" "musl"; do
            URL="${BASE}/openwrt-sdk-${VERSION}-${TARGET}-${SUBTARGET}_${suffix}.Linux-x86_64.tar.zst"
            if wget --spider -q "$URL" 2>/dev/null; then
              echo "📦 下载: $URL"
              wget -q "$URL" -O sdk.tar.zst
              echo "✅ $(du -h sdk.tar.zst | cut -f1)"
              exit 0
            fi
          done
          echo "❌ SDK not found"
          exit 1

      - name: 解压 SDK
        run: |
          rm -rf sdk
          mkdir -p sdk
          tar --zstd -xf sdk.tar.zst -C sdk --strip-components=1

      - name: 克隆插件仓库
        run: |
          git clone --depth 1 --branch ${{ inputs.repo_branch }} \
            ${{ inputs.repo_url }} /tmp/plugin-repo
          find /tmp/plugin-repo -maxdepth 3 -type d | sort

      - name: 更新 feeds
        working-directory: sdk
        run: |
          ./scripts/feeds update -a >/dev/null 2>&1
          ./scripts/feeds install -a >/dev/null 2>&1
          echo "✅ feeds 就绪"

      - name: 放入插件源码
        working-directory: sdk
        run: |
          PKG_DIR="${{ inputs.package_dir }}"
          PLUGIN_DIRS=()

          if [ -n "$PKG_DIR" ] && [ -d "/tmp/plugin-repo/${PKG_DIR}" ]; then
            SEARCH="/tmp/plugin-repo/${PKG_DIR}"
          else
            SEARCH="/tmp/plugin-repo"
          fi

          while IFS= read -r mf; do
            DIR=$(dirname "$mf")
            case "$DIR" in */feeds/*) continue ;; esac

            PKG=$(grep -m1 'PKG_NAME' "$mf" 2>/dev/null | sed 's/.*:=\s*//')
            if [ -z "$PKG" ]; then
              PKG=$(basename "$DIR")
              echo "📦 $PKG (目录名兜底, $DIR)"
            else
              echo "📦 $PKG ($DIR)"
            fi
            PLUGIN_DIRS+=("${PKG}:${DIR}")
          done < <(find "$SEARCH" -maxdepth 3 -name 'Makefile')

          if [ ${#PLUGIN_DIRS[@]} -eq 0 ]; then
            echo "❌ 未找到插件"
            find "$SEARCH" -maxdepth 3 -name 'Makefile'
            exit 1
          fi

          printf '%s\n' "${PLUGIN_DIRS[@]%%:*}" > /tmp/plugin_names.txt
          printf '%s\n' "${PLUGIN_DIRS[@]}"     > /tmp/plugin_list.txt

          for entry in "${PLUGIN_DIRS[@]}"; do
            PKG="${entry%%:*}"
            SRC="${entry#*:}"

            rm -rf "package/feeds/luci/${PKG}" "feeds/luci/applications/${PKG}" "package/${PKG}" 2>/dev/null || true

            cp -rT "$SRC" "package/${PKG}"

            if [ -f "package/${PKG}/Makefile" ] && grep -q 'LUCI_DEPENDS' "package/${PKG}/Makefile"; then
              sed -i '/^LUCI_DEPENDS:/d' "package/${PKG}/Makefile"
            fi

            if [ -d "package/${PKG}/www" ]; then
              if [ -d "package/${PKG}/htdocs" ]; then
                cp -rT "package/${PKG}/www" "package/${PKG}/htdocs"
                rm -rf "package/${PKG}/www"
              else
                mv "package/${PKG}/www" "package/${PKG}/htdocs"
              fi
            fi

            echo "  ✅ $PKG"
          done

      - name: 配置编译选项
        working-directory: sdk
        run: |
          while read -r PKG; do
            [ -z "$PKG" ] && continue
            echo "CONFIG_PACKAGE_${PKG}=y" >> .config
          done < /tmp/plugin_names.txt

          make defconfig || true

          echo "✅ 配置完成"
          while read -r PKG; do
            [ -z "$PKG" ] && continue
            grep -q "CONFIG_PACKAGE_${PKG}=y" .config && echo "  ✅ $PKG" || echo "  ⚠️ $PKG"
          done < /tmp/plugin_names.txt

      - name: 编译插件
        working-directory: sdk
        run: |
          FAILED=()

          while read -r PKG; do
            [ -z "$PKG" ] && continue

            echo ""
            echo "══════ 编译: $PKG ══════"

            make "package/${PKG}/clean" V=s -j$(nproc) 2>&1 | tail -5 || true

            if make "package/${PKG}/compile" V=s -j$(nproc) 2>&1 | tail -100; then
              echo "  ✅ $PKG"
            else
              echo "  ❌ $PKG"
              FAILED+=("$PKG")
            fi
          done < /tmp/plugin_names.txt

          echo ""
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "FAIL: ${FAIL[@]}"
          else
            echo "ALL OK"
          fi

      - name: 收集产物
        run: |
          mkdir -p artifacts

          while read -r PKG; do
            [ -z "$PKG" ] && continue
            for ext in apk ipk; do
              find sdk/bin -type f -name "*${PKG}*.${ext}" 2>/dev/null | while read f; do
                cp "$f" artifacts/
                echo "  $(basename $f)"
              done
            done
          done < /tmp/plugin_names.txt

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-packages
          path: artifacts/*
          retention-days: 90

      - name: 清理
        if: always()
        run: rm -rf sdk /tmp/plugin-repo /tmp/plugin_names.txt /tmp/plugin_list.txt artifacts
