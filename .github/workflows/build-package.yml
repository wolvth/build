# .github/workflows/build-package.yml
# 通用 OpenWrt LuCI 插件编译器（支持多插件、APK/IPK 自动适配）

name: Build OpenWrt Plugin

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: '插件仓库地址 (HTTPS)'
        required: true
        default: 'https://github.com/wolvth/build.git'
      repo_branch:
        description: '仓库分支'
        required: false
        default: 'main'
      package_dir:
        description: '插件在仓库中的子目录 (留空=自动扫描所有插件)'
        required: false
        default: 'new'
      openwrt_version:
        description: 'OpenWrt 版本'
        required: true
        type: choice
        options:
          - '25.12.5'
          - '24.10.5'
        default: '25.12.5'
      target_arch:
        description: '目标架构 (TARGET SUBTARGET)'
        required: true
        type: choice
        options:
          - 'rockchip armv8'
          - 'x86 64'
          - 'mediatek filogic'
          - 'mediatek mt7622'
          - 'qualcommax ipq807x'
        default: 'rockchip armv8'
      gcc_version:
        description: 'GCC 版本 (留空自动尝试)'
        required: false
        default: '14.3.0'

jobs:
  build:
    name: Build LuCI Plugins
    runs-on: ubuntu-24.04

    env:
      FEED_NAME: custom_plugins

    steps:

    # ── 1. 解析参数 ──────────────────────────────────────────────
    - name: 解析参数
      run: |
        TARGET=$(echo "${{ inputs.target_arch }}" | awk '{print $1}')
        SUBTARGET=$(echo "${{ inputs.target_arch }}" | awk '{print $2}')
        VERSION="${{ inputs.openwrt_version }}"
        GCC="${{ inputs.gcc_version }}"
        GCC="${GCC:-14.3.0}"

        echo "TARGET=$TARGET" >> $GITHUB_ENV
        echo "SUBTARGET=$SUBTARGET" >> $GITHUB_ENV
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "GCC=$GCC" >> $GITHUB_ENV

        SDK_BASE="https://downloads.openwrt.org/releases/${VERSION}/targets/${TARGET}/${SUBTARGET}"
        echo "SDK_BASE=$SDK_BASE" >> $GITHUB_ENV

        echo "=========================================="
        echo "📋 编译参数:"
        echo "   OpenWrt: ${VERSION}"
        echo "   目标:    ${TARGET}/${SUBTARGET}"
        echo "   GCC:     ${GCC}"
        echo "=========================================="

    # ── 2. 安装依赖 ──────────────────────────────────────────────
    - name: 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libelf-dev \
          libssl-dev python3 python3-dev rsync unzip \
          python3-pyelftools python3-dev python3-setuptools\
          zlib1g-dev file wget qemu-utils zstd
        echo "✅ 依赖就绪"

    # ── 3. 缓存 SDK ──────────────────────────────────────────────
    - name: 缓存 SDK 压缩包
      id: cache-sdk
      uses: actions/cache@v4
      with:
        path: sdk.tar.zst
        key: sdk-${{ env.VERSION }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-gcc${{ env.GCC }}

    # ── 4. 下载 SDK ──────────────────────────────────────────────
    - name: 下载 OpenWrt SDK
      if: steps.cache-sdk.outputs.cache-hit != 'true'
      run: |
        SDK_BASE="${{ env.SDK_BASE }}"
        GCC="${{ env.GCC }}"
        VERSION="${{ env.VERSION }}"
        TARGET="${{ env.TARGET }}"
        SUBTARGET="${{ env.SUBTARGET }}"

        SDK_URL=""
        for suffix in "gcc-${GCC}_musl" "musl"; do
          FILE="openwrt-sdk-${VERSION}-${TARGET}-${SUBTARGET}_${suffix}.Linux-x86_64.tar.zst"
          URL="${SDK_BASE}/${FILE}"
          echo "🔍 尝试: $URL"
          if wget --spider -q "$URL" 2>/dev/null; then
            SDK_URL="$URL"
            break
          fi
        done

        if [ -z "$SDK_URL" ]; then
          echo "❌ 找不到 SDK，请检查版本和架构是否正确"
          echo "   浏览: $SDK_BASE/"
          exit 1
        fi

        echo "📦 下载: $SDK_URL"
        wget -q --show-progress "$SDK_URL" -O sdk.tar.zst
        echo "✅ 下载完成: $(du -h sdk.tar.zst | cut -f1)"

    # ── 5. 解压 SDK ──────────────────────────────────────────────
    - name: 解压 SDK
      run: |
        rm -rf sdk
        mkdir -p sdk
        tar --zstd -xf sdk.tar.zst -C sdk --strip-components=1
        echo "✅ SDK 解压完成"
        ls sdk/

    # ── 6. 克隆插件仓库 ──────────────────────────────────────────
    - name: 克隆插件仓库
      run: |
        git clone --depth 1 --branch ${{ inputs.repo_branch }} \
          ${{ inputs.repo_url }} /tmp/plugin-repo

        echo "=== 仓库结构 ==="
        find /tmp/plugin-repo -maxdepth 3 -type d | sort
        echo ""

        # 自动发现所有插件目录（包含 Makefile + PKG_NAME）
        PKG_DIR="${{ inputs.package_dir }}"
        if [ -n "$PKG_DIR" ] && [ -d "/tmp/plugin-repo/${PKG_DIR}" ]; then
          SEARCH_ROOT="/tmp/plugin-repo/${PKG_DIR}"
        else
          SEARCH_ROOT="/tmp/plugin-repo"
        fi

        # 收集插件
        PLUGIN_LIST=""
        while IFS= read -r makefile; do
          if grep -q 'PKG_NAME' "$makefile" 2>/dev/null; then
            PKG=$(grep -m1 'PKG_NAME' "$makefile" | sed 's/.*:=\s*//')
            DIR=$(dirname "$makefile")
            # 跳过 feeds 里的包
            case "$DIR" in */feeds/*) continue ;; esac
            PLUGIN_LIST="${PLUGIN_LIST}${PKG}:${DIR}\n"
            echo "📦 发现插件: $PKG ($DIR)"
          fi
        done < <(find "$SEARCH_ROOT" -maxdepth 3 -name 'Makefile')

        if [ -z "$PLUGIN_LIST" ]; then
          echo "❌ 未找到任何插件"
          find "$SEARCH_ROOT" -maxdepth 3 -name 'Makefile' | head -10
          exit 1
        fi

        printf "$PLUGIN_LIST" > /tmp/plugin_list.txt
        TOTAL=$(wc -l < /tmp/plugin_list.txt)
        echo ""
        echo "共发现 ${TOTAL} 个插件"

    # ── 7. 更新 feeds ────────────────────────────────────────────
    - name: 更新 feeds
      working-directory: sdk
      run: |
        ./scripts/feeds update -a >/dev/null 2>&1
        ./scripts/feeds install -a >/dev/null 2>&1
        echo "✅ feeds 就绪"

    # ── 8. 放入插件源码 ──────────────────────────────────────────
    - name: 集成插件源码
      working-directory: sdk
      run: |
        echo "=========================================="
        echo "🔧 集成插件源码"
        echo "=========================================="

        while IFS=: read -r PKG SRC_DIR; do
          [ -z "$PKG" ] && continue
          echo ""
          echo "── $PKG ──"

          # 清理同名包
          rm -rf "package/feeds/luci/${PKG}" 2>/dev/null || true
          rm -rf "feeds/luci/applications/${PKG}" 2>/dev/null || true
          rm -rf "package/${PKG}" 2>/dev/null || true

          # 复制源码
          cp -rT "$SRC_DIR" "package/${PKG}"
          echo "  ✅ 源码已复制到 package/${PKG}"

          # 修复 LUCI_DEPENDS（删除，避免依赖问题）
          MAKEFILE="package/${PKG}/Makefile"
          if [ -f "$MAKEFILE" ] && grep -q 'LUCI_DEPENDS' "$MAKEFILE"; then
            sed -i '/^LUCI_DEPENDS:/d' "$MAKEFILE"
            echo "  ✅ 已删除 LUCI_DEPENDS"
          fi

          # 关键修复：www/ → htdocs/
          # luci.mk 的 Build/Prepare 阶段只拷贝 htdocs/，不认 www/
          # htdocs/ 安装到设备后自动映射为 /www/
          if [ -d "package/${PKG}/www" ]; then
            if [ -d "package/${PKG}/htdocs" ]; then
              echo "  ⚠️ 同时存在 www/ 和 htdocs/，合并..."
              cp -rT "package/${PKG}/www" "package/${PKG}/htdocs"
              rm -rf "package/${PKG}/www"
            else
              mv "package/${PKG}/www" "package/${PKG}/htdocs"
              echo "  ✅ www/ → htdocs/"
            fi
          elif [ -d "package/${PKG}/htdocs" ]; then
            echo "  ℹ️ 已是 htdocs/，无需修改"
          fi

          # 调试：显示最终目录结构
          echo "  📂 目录结构:"
          find "package/${PKG}" -type f | sort | sed 's/^/    /' | head -30

        done < /tmp/plugin_list.txt

    # ── 9. 配置编译 ──────────────────────────────────────────────
    - name: 配置编译选项
      working-directory: sdk
      run: |
        # 基础配置
        cat > .config <<EOF
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-base=y
        CONFIG_PACKAGE_luci-compat=y
        EOF

        # 勾选所有自定义插件
        while IFS=: read -r PKG _; do
          [ -z "$PKG" ] && continue
          echo "CONFIG_PACKAGE_${PKG}=y" >> .config
          # 自动勾选中文语言包
          SHORT=${PKG#luci-app-}
          echo "CONFIG_PACKAGE_luci-i18n-${SHORT}-zh-cn=y" >> .config
        done < /tmp/plugin_list.txt

        # defconfig 可能有循环依赖警告，忽略
        make defconfig || true

        echo "✅ 编译配置:"
        grep 'CONFIG_PACKAGE_.*=y' .config | grep -v 'NOT_SET'

    # ── 10. 编译插件 ─────────────────────────────────────────────
    - name: 编译插件
      working-directory: sdk
      run: |
        set -o pipefail

        while IFS=: read -r PKG _; do
          [ -z "$PKG" ] && continue
          echo ""
          echo "============================================"
          echo "  🔨 编译: $PKG"
          echo "============================================"

          make "package/${PKG}/clean" V=s -j$(nproc) 2>/dev/null || true
          make "package/${PKG}/compile" V=s -j$(nproc) 2>&1 | tail -100

          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "❌ $PKG 编译失败"
            exit 1
          fi
          echo "✅ $PKG 编译完成"

        done < /tmp/plugin_list.txt

    # ── 11. 收集产物 ─────────────────────────────────────────────
    - name: 收集编译产物
      run: |
        mkdir -p artifacts

        echo "🔍 搜索编译产物..."
        while IFS=: read -r PKG _; do
          [ -z "$PKG" ] && continue

          # 搜索主包
          for ext in apk ipk; do
            find sdk/bin -type f -name "*${PKG}*.${ext}" 2>/dev/null | while read f; do
              echo "  📦 $(basename $f)"
              cp "$f" artifacts/
            done
          done

          # 搜索语言包
          SHORT=${PKG#luci-app-}
          for ext in apk ipk; do
            find sdk/bin -type f -name "*luci-i18n-${SHORT}*.${ext}" 2>/dev/null | while read f; do
              echo "  📦 $(basename $f)"
              cp "$f" artifacts/
            done
          done

        done < /tmp/plugin_list.txt

        echo ""
        echo "=========================================="
        echo "📦 编译产物:"
        echo "=========================================="
        ls -lh artifacts/

        if [ ! "$(ls -A artifacts/)" ]; then
          echo "❌ 未找到任何编译产物"
          find sdk/bin -type f 2>/dev/null | head -30
          exit 1
        fi

    # ── 12. 上传产物 ─────────────────────────────────────────────
    - name: 上传编译产物
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-packages
        path: artifacts/*
        if-no-files-found: error
        retention-days: 90

    # ── 13. 清理 ─────────────────────────────────────────────────
    - name: 清理
      if: always()
      run: rm -rf sdk /tmp/plugin-repo /tmp/plugin_list.txt artifacts
