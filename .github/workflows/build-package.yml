# .github/workflows/build-package.yml
# 通用 OpenWrt LuCI 插件编译器（基于 SDK）

name: Build OpenWrt Plugin

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: '插件仓库地址 (HTTPS)'
        required: true
        default: 'https://github.com/wolvth/luci-app-dae.git'
      repo_branch:
        description: '仓库分支'
        required: false
        default: 'main'
      package_dir:
        description: '插件在仓库中的子目录 (留空=仓库根目录)'
        required: false
        default: ''
      openwrt_version:
        description: 'OpenWrt 版本'
        required: true
        type: choice
        options:
          - '25.12.5'
          - '24.10.5'
        default: '25.12.5'
      target_arch:
        description: '目标架构'
        required: true
        type: choice
        options:
          - 'rockchip armv8'
          - 'x86 64'
          - 'mediatek filogic'
          - 'mediatek mt7622'
          - 'qualcommax ipq807x'
        default: 'rockchip armv8'
      gcc_version:
        description: 'GCC 版本 (留空自动尝试)'
        required: false
        default: '14.3.0'

jobs:
  build:
    name: Build LuCI Plugin (.apk)
    runs-on: ubuntu-24.04

    steps:

    # ── 1. 解析参数 ──────────────────────────────────────────────
    - name: 解析参数
      run: |
        TARGET=$(echo "${{ inputs.target_arch }}" | awk '{print $1}')
        SUBTARGET=$(echo "${{ inputs.target_arch }}" | awk '{print $2}')
        VERSION="${{ inputs.openwrt_version }}"
        GCC="${{ inputs.gcc_version }}"
        GCC="${GCC:-14.3.0}"

        echo "TARGET=$TARGET" >> $GITHUB_ENV
        echo "SUBTARGET=$SUBTARGET" >> $GITHUB_ENV
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "GCC=$GCC" >> $GITHUB_ENV

        SDK_BASE="https://downloads.openwrt.org/releases/${VERSION}/targets/${TARGET}/${SUBTARGET}"
        echo "SDK_BASE=$SDK_BASE" >> $GITHUB_ENV

        echo "=========================================="
        echo "📋 编译参数:"
        echo "   OpenWrt: ${VERSION}"
        echo "   目标:    ${TARGET}/${SUBTARGET}"
        echo "   GCC:     ${GCC}"
        echo "=========================================="

    # ── 2. 安装依赖 ──────────────────────────────────────────────
    - name: 安装系统依赖
      run: |
        sudo apt-get update -qq
        sudo apt-get install -yqq \
          build-essential libncurses-dev zlib1g-dev gawk git gettext \
          libssl-dev xsltproc rsync wget unzip python3 python3-pyelftools \
          python3-dev python3-setuptools zstd file
        echo "✅ 依赖就绪"

    # ── 3. 缓存 SDK ──────────────────────────────────────────────
    - name: 缓存 SDK 压缩包
      id: cache-sdk
      uses: actions/cache@v4
      with:
        path: sdk.tar.zst
        key: sdk-${{ env.VERSION }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-gcc${{ env.GCC }}-v2

    # ── 4. 下载 SDK ──────────────────────────────────────────────
    - name: 下载 OpenWrt SDK
      if: steps.cache-sdk.outputs.cache-hit != 'true'
      run: |
        SDK_BASE="${{ env.SDK_BASE }}"
        GCC="${{ env.GCC }}"
        VERSION="${{ env.VERSION }}"
        TARGET="${{ env.TARGET }}"
        SUBTARGET="${{ env.SUBTARGET }}"

        SDK_URL=""
        for suffix in "gcc-${GCC}_musl" "musl"; do
          FILE="openwrt-sdk-${VERSION}-${TARGET}-${SUBTARGET}_${suffix}.Linux-x86_64.tar.zst"
          URL="${SDK_BASE}/${FILE}"
          echo "🔍 尝试: $URL"
          if wget --spider -q "$URL" 2>/dev/null; then
            SDK_URL="$URL"
            break
          fi
        done

        if [ -z "$SDK_URL" ]; then
          echo "❌ 找不到 SDK，请检查: ${SDK_BASE}/"
          exit 1
        fi

        echo "📦 下载: $SDK_URL"
        wget -q --show-progress "$SDK_URL" -O sdk.tar.zst
        echo "✅ 下载完成: $(du -h sdk.tar.zst | cut -f1)"

    # ── 5. 解压 SDK ──────────────────────────────────────────────
    - name: 解压 SDK
      run: |
        rm -rf sdk
        mkdir -p sdk
        tar --zstd -xf sdk.tar.zst -C sdk --strip-components=1
        echo "✅ SDK 解压完成"
        echo "SDK 内容:"
        ls sdk/

    # ── 6. 克隆插件仓库 ──────────────────────────────────────────
    - name: 克隆插件源码
      run: |
        echo "📥 克隆: ${{ inputs.repo_url }}"
        git clone --depth 1 --branch ${{ inputs.repo_branch }} \
          ${{ inputs.repo_url }} /tmp/plugin-repo

        echo "仓库结构:"
        find /tmp/plugin-repo -maxdepth 3 -type d | sort

    # ── 7. 更新 feeds ────────────────────────────────────────────
    - name: 更新 feeds
      working-directory: sdk
      run: |
        ./scripts/feeds update -a >/dev/null 2>&1
        ./scripts/feeds install -a >/dev/null 2>&1
        echo "✅ feeds 就绪"

    # ── 8. 放入插件源码（关键步骤）────────────────────────────────
    - name: 放入插件源码
      working-directory: sdk
      run: |
        PKG_DIR="${{ inputs.package_dir }}"
        REPO_URL="${{ inputs.repo_url }}"

        # 从仓库地址猜测包名（用于清理同名包）
        # 也可以直接用目录名
        PLUGIN_DIRS=()

        # 自动发现插件目录
        if [ -n "$PKG_DIR" ] && [ -d "/tmp/plugin-repo/${PKG_DIR}" ]; then
          SEARCH_ROOT="/tmp/plugin-repo/${PKG_DIR}"
        else
          SEARCH_ROOT="/tmp/plugin-repo"
        fi

        # 收集所有插件
        while IFS= read -r makefile; do
          if grep -q 'PKG_NAME' "$makefile" 2>/dev/null; then
            PKG=$(grep -m1 'PKG_NAME' "$makefile" | sed 's/.*:=\s*//')
            DIR=$(dirname "$makefile")
            case "$DIR" in */feeds/*) continue ;; esac
            PLUGIN_DIRS+=("${PKG}:${DIR}")
            echo "📦 发现插件: $PKG ($DIR)"
          fi
        done < <(find "$SEARCH_ROOT" -maxdepth 3 -name 'Makefile')

        if [ ${#PLUGIN_DIRS[@]} -eq 0 ]; then
          echo "❌ 未找到插件"
          find "$SEARCH_ROOT" -maxdepth 3 -name 'Makefile'
          exit 1
        fi

        # 处理每个插件
        for entry in "${PLUGIN_DIRS[@]}"; do
          PKG="${entry%%:*}"
          SRC_DIR="${entry#*:}"
          echo ""
          echo "════════════════════════════════════════"
          echo "  处理: $PKG"
          echo "════════════════════════════════════════"

          # ---- 清理 feed 中同名包 ----
          rm -rf "package/feeds/luci/${PKG}" 2>/dev/null || true
          rm -rf "feeds/luci/applications/${PKG}" 2>/dev/null || true
          rm -rf "package/${PKG}" 2>/dev/null || true

          # ---- 拷贝源码到 package/ ----
          cp -rT "$SRC_DIR" "package/${PKG}"
          echo "  ✅ 源码 → package/${PKG}"

          # ---- 删除 LUCI_DEPENDS ----
          MAKEFILE="package/${PKG}/Makefile"
          if [ -f "$MAKEFILE" ] && grep -q 'LUCI_DEPENDS' "$MAKEFILE"; then
            sed -i '/^LUCI_DEPENDS:/d' "$MAKEFILE"
            echo "  ✅ 已删除 LUCI_DEPENDS"
          fi

          # ---- www/ → htdocs/ ----
          if [ -d "package/${PKG}/www" ]; then
            if [ -d "package/${PKG}/htdocs" ]; then
              cp -rT "package/${PKG}/www" "package/${PKG}/htdocs"
              rm -rf "package/${PKG}/www"
            else
              mv "package/${PKG}/www" "package/${PKG}/htdocs"
            fi
            echo "  ✅ www/ → htdocs/"
          fi

          # ---- 确认文件 ----
          echo "  📂 目录结构:"
          find "package/${PKG}" -type f | sort | sed 's/^/    /'

          # ---- 确认 Makefile 内容 ----
          echo "  📄 Makefile:"
          cat "package/${PKG}/Makefile"
        done
        
        # ============================================
        # 自动同步 Makefile 的版本号到 overview.js
        # ============================================
        MAKE_VER=$(grep -Po 'PKG_VERSION:=\K.*' "package/${PACKAGE_NAME}/Makefile" || echo "1.0.0")
        
        # 使用更严格的正则 [^\"]* 防止破坏同行其他 JS 代码
        sed -i "s/const PKG_VERSION=\"[^\"]*\"/const PKG_VERSION=\"${MAKE_VER}\"/" "package/${PACKAGE_NAME}/htdocs/luci-static/resources/view/dae/overview.js"
        
        echo "✅ 已自动将前端 overview.js 版本号同步为: ${MAKE_VER}"

        # 保存插件列表
        printf '%s\n' "${PLUGIN_DIRS[@]}" > /tmp/plugin_list.txt

    # ── 9. 配置 ──────────────────────────────────────────────────
    - name: 配置编译选项
      working-directory: sdk
      run: |
        cat > .config <<EOF
        CONFIG_PACKAGE_${PKG}=y
        EOF

        make defconfig || true

        echo "✅ 配置完成"
        grep -i "${PKG}" .config || echo "⚠️ 未找到 ${PKG}"

    # ── 10. 编译 ─────────────────────────────────────────────────
    - name: 编译插件
      working-directory: sdk
      run: |
        set -o pipefail

        echo "🔨 开始编译 ${PKG}..."
        echo "   目标: rockchip/armv8"
        echo "   并行: $(nproc) 线程"
        echo ""

        # 先 clean 再 compile，分成两条命令
        # 不能写成 {clean,compile} 并加引号，否则 bash 不会展开花括号
        make package/${PKG}/clean V=s -j$(nproc) || true

        echo ""
        echo "=== 开始编译 ==="
        echo ""

        make package/${PKG}/compile V=s -j$(nproc) 2>&1 | tail -200

        echo ""
        echo "✅ 编译成功"

    # ── 11. 收集产物 ─────────────────────────────────────────────
    - name: 收集编译产物
      run: |
        mkdir -p artifacts

        while IFS=: read -r PKG _; do
          [ -z "$PKG" ] && continue
          for ext in apk ipk; do
            find sdk/bin -type f -name "*${PKG}*.${ext}" 2>/dev/null | while read f; do
              echo "  📦 $(basename $f)"
              cp "$f" artifacts/
            done
          done
          SHORT=${PKG#luci-app-}
          for ext in apk ipk; do
            find sdk/bin -type f -name "*luci-i18n-${SHORT}*.${ext}" 2>/dev/null | while read f; do
              echo "  📦 $(basename $f)"
              cp "$f" artifacts/
            done
          done
        done < /tmp/plugin_list.txt

        echo ""
        echo "=========================================="
        echo "📦 编译产物:"
        echo "=========================================="
        ls -lh artifacts/ 2>/dev/null || echo "(空)"

    # ── 12. 上传 ─────────────────────────────────────────────────
    - name: 上传编译产物
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-packages
        path: artifacts/*
        if-no-files-found: warn
        retention-days: 90

    - name: 清理
      if: always()
      run: rm -rf sdk /tmp/plugin-repo /tmp/plugin_list.txt artifacts
